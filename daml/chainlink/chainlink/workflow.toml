# Proc_Client — Chainlink CRE Workflow Definition
# Generated by CantonFlow Canvas
# Orchestrates Daml contract state machine via Canton JSON API

[workflow]
name = "proc-client-orchestration"
version = "1.0.0"
owner = "cantonflow"
daml_template = "Main:Proc_ClientProcess"

[workflow.parties]
bridgeRelay = { name = "Bridge Relay", role = "participant" }
client = { name = "Client", role = "participant" }
evaluator = { name = "Evaluator", role = "participant" }
provider = { name = "Provider", role = "participant" }

[[triggers]]
type = "on_demand"
description = "Triggered via CRE API to start a new workflow instance"

[[triggers]]
type = "cron"
schedule = "*/5 * * * *"
description = "Poll for pending workflow steps that need advancement"

# ---- Workflow Steps ----

[[steps]]
id = "initialize"
name = "Create Daml Contract"
action = "canton_create"
[steps.config]
  template_id = "Main:Proc_ClientProcess"
  initial_state = "Start_Client"
  parties = ["Bridge Relay", "Client", "Evaluator", "Provider"]

[[steps]]
id = "create-payment-obligation"
name = "Create Payment Obligation"
action = "canton_exercise"
depends_on = ["initialize"]
requires_approval = true
approver = "Client"
[steps.config]
  choice = "CreatePaymentObligation"
  controller = "Client"
  template_id = "Main:Proc_ClientProcess"
  contract_id = "{{steps.initialize.contract_id}}"
  [steps.config.fields]
    description = { type = "Text", required = true }
    amount = { type = "Decimal", required = true }
    currency = { type = "Text", required = true }
    expiredAt = { type = "Time", required = true }

[[steps]]
id = "lock-wrappedusdc"
name = "Lock WrappedUSDC"
action = "canton_exercise"
depends_on = ["create-payment-obligation"]
[steps.config]
  choice = "LockWrappedUSDC"
  controller = "Client"
  template_id = "Main:Proc_ClientProcess"
  contract_id = "{{steps.create-payment-obligation.contract_id}}"

[[steps]]
id = "receive-settlement-confirmation"
name = "Receive Settlement Confirmation"
action = "canton_exercise"
depends_on = ["lock-wrappedusdc"]
requires_approval = true
approver = "Client"
[steps.config]
  choice = "ReceiveSettlementConfirmation"
  controller = "Client"
  template_id = "Main:Proc_ClientProcess"
  contract_id = "{{steps.lock-wrappedusdc.contract_id}}"

[[steps]]
id = "complete"
name = "Complete Workflow"
action = "canton_exercise"
depends_on = ["receive-settlement-confirmation"]
[steps.config]
  choice = "JobComplete"
  controller = "Bridge Relay"
  template_id = "Main:Proc_ClientProcess"
  contract_id = "{{steps.receive-settlement-confirmation.contract_id}}"
